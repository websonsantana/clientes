<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bíblia Sagrada Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --safe-bottom: env(safe-area-inset-bottom, 20px); }
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .font-bible { font-family: 'Lora', serif; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
        
        .glass { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
        .dark .glass { background: rgba(31, 41, 55, 0.85); border-color: rgba(255, 255, 255, 0.05); }
        
        .floating-nav-container { position: fixed; bottom: calc(20px + var(--safe-bottom)); left: 50%; transform: translateX(-50%); width: 92%; max-width: 400px; z-index: 40; }
        .floating-nav { display: flex; justify-content: space-between; padding: 6px 12px; border-radius: 9999px; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1); }
        
        .verse { transition: background-color 0.2s ease, transform 0.1s ease; line-height: 1.8; }
        .verse.highlighted { background-color: rgba(199, 210, 254, 0.5); border-radius: 8px; }
        .dark .verse.highlighted { background-color: rgba(55, 48, 163, 0.4); }
        
        .verse.underlined-text span.text-content { text-decoration: underline; text-decoration-color: #6366f1; text-decoration-thickness: 2px; text-underline-offset: 4px; }
        .verse.highlight-yellow span.text-content { background-color: rgba(253, 224, 71, 0.4); padding: 2px 4px; border-radius: 4px; }
        .verse.highlight-green span.text-content { background-color: rgba(134, 239, 172, 0.4); padding: 2px 4px; border-radius: 4px; }
        .verse.highlight-blue span.text-content { background-color: rgba(147, 197, 253, 0.4); padding: 2px 4px; border-radius: 4px; }
        .verse.highlight-pink span.text-content { background-color: rgba(249, 168, 212, 0.4); padding: 2px 4px; border-radius: 4px; }
        
        .note-indicator { display: inline-block; width: 6px; height: 6px; background: #8b5cf6; border-radius: 50%; margin-left: 4px; vertical-align: super; }
        
        .fade-in { animation: fadeIn 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .slide-up { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        
        .progress-bar-fill { transition: width 0.4s ease; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 transition-colors duration-300 dark:bg-gray-900 dark:text-gray-200 antialiased selection:bg-indigo-200 dark:selection:bg-indigo-900">

    <div id="splashScreen" class="fixed inset-0 z-[100] bg-gradient-to-br from-indigo-600 to-blue-700 flex flex-col items-center justify-center transition-opacity duration-500">
        <div class="bg-white/20 p-6 rounded-3xl backdrop-blur-sm mb-6 shadow-2xl">
            <i class="fas fa-bible text-white text-6xl animate-pulse"></i>
        </div>
        <h1 class="text-white text-3xl font-bold mb-2 tracking-tight">Bíblia Digital</h1>
        <p id="splashStatus" class="text-indigo-200 text-sm mb-8 font-medium text-center px-6">Iniciando sistema...</p>
        <div class="w-56 h-1.5 bg-indigo-900/50 rounded-full overflow-hidden">
            <div id="splashProgress" class="progress-bar-fill h-full bg-white rounded-full w-0"></div>
        </div>
    </div>
    
    <header class="glass sticky top-0 z-30 border-b border-gray-200/50 dark:border-gray-700/50">
        <div class="container mx-auto px-5 py-4 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-500/30">
                    <i class="fas fa-book-open text-white text-lg"></i>
                </div>
                <h1 class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-indigo-700 dark:from-blue-400 dark:to-indigo-400 tracking-tight">Bíblia Sagrada</h1>
            </div>
            <button id="themeToggle" class="w-10 h-10 rounded-full bg-gray-100 dark:bg-gray-800 flex items-center justify-center text-gray-600 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-700 transition active:scale-95">
                <i class="fas fa-moon"></i>
            </button>
        </div>
    </header>

    <div id="mainContent" class="pb-32 transition-transform duration-300 transform translate-x-0">
        
        <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700 p-4 mx-4 mt-6 flex justify-between items-center">
            <div class="flex-1 cursor-pointer group" id="openSelectorBtn">
                <h2 id="currentBook" class="font-bold text-xl text-indigo-700 dark:text-indigo-400 group-hover:text-indigo-600 transition tracking-tight">Carregando...</h2>
                <p id="currentChapter" class="text-gray-500 dark:text-gray-400 text-sm font-medium">Aguarde</p>
            </div>
            <button class="w-10 h-10 rounded-full bg-indigo-50 text-indigo-600 dark:bg-indigo-900/40 dark:text-indigo-400 flex items-center justify-center pointer-events-none">
                <i class="fas fa-chevron-down text-sm"></i>
            </button>
        </div>
        
        <div class="bg-white dark:bg-gray-800 rounded-3xl shadow-xl shadow-gray-200/40 dark:shadow-none border border-gray-100 dark:border-gray-700 p-6 sm:p-8 mx-4 mt-4">
            <h3 id="chapterTitle" class="text-3xl font-bold text-center mb-8 text-gray-800 dark:text-gray-100 border-b-2 border-indigo-50 dark:border-gray-700 pb-4 tracking-tight font-serif"></h3>
            <div id="bibleText" class="font-bible text-lg md:text-xl leading-relaxed space-y-2 text-gray-800 dark:text-gray-200">
                </div>
            
            <div class="flex justify-between items-center mt-12 pt-6 border-t border-gray-100 dark:border-gray-700">
                <button id="prevChapter" class="flex items-center text-sm font-medium text-gray-500 hover:text-indigo-600 dark:text-gray-400 dark:hover:text-indigo-400 transition bg-gray-50 dark:bg-gray-700/50 px-4 py-2 rounded-full disabled:opacity-30">
                    <i class="fas fa-arrow-left mr-2"></i> Anterior
                </button>
                <button id="nextChapter" class="flex items-center text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 px-6 py-2 rounded-full shadow-md shadow-indigo-600/20 transition disabled:opacity-30">
                    Próximo <i class="fas fa-arrow-right ml-2"></i>
                </button>
            </div>
        </div>
    </div>

    <div id="bookChapterSelector" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 flex items-end justify-center hidden fade-in">
        <div class="bg-white dark:bg-gray-800 w-full rounded-t-3xl p-6 slide-up max-h-[85vh] flex flex-col">
            <div class="w-12 h-1.5 bg-gray-300 dark:bg-gray-600 rounded-full mx-auto mb-6"></div>
            <h3 class="text-xl font-bold mb-4 dark:text-white">Selecione o Capítulo</h3>
            
            <div class="space-y-4 flex-grow overflow-hidden flex flex-col">
                <div>
                    <label class="text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider mb-2 block">Livro</label>
                    <select id="bookSelect" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 text-gray-800 font-medium focus:ring-2 focus:ring-indigo-500 outline-none dark:bg-gray-700 dark:border-gray-600 dark:text-white appearance-none"></select>
                </div>
                <div class="flex-grow overflow-y-auto pr-2 pb-4">
                    <label class="text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider mb-2 block">Capítulo</label>
                    <div id="chapterGrid" class="grid grid-cols-5 gap-2"></div>
                </div>
            </div>
            <button id="closeSelectorBtn" class="w-full bg-gray-100 text-gray-700 dark:bg-gray-700 dark:text-gray-200 font-bold py-4 rounded-xl mt-4 active:scale-95 transition">Cancelar</button>
        </div>
    </div>
    
    <div id="searchOverlay" class="fixed inset-0 bg-gray-50 dark:bg-gray-900 z-50 hidden transition-all duration-300 p-4 pt-safe flex flex-col">
        <div class="glass -mx-4 -mt-4 p-4 flex items-center space-x-3 mb-4 shadow-sm border-b dark:border-gray-800 shrink-0">
            <button id="closeSearch" class="w-10 h-10 rounded-full flex items-center justify-center text-gray-600 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-800 transition">
                <i class="fas fa-arrow-left text-lg"></i>
            </button>
            <div class="flex-grow relative">
                <i class="fas fa-search absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                <input type="text" id="searchInput" placeholder="Pesquisar em toda Bíblia..." class="w-full bg-white border-0 rounded-full pl-10 pr-4 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-500 dark:bg-gray-800 dark:text-white shadow-sm font-medium">
            </div>
        </div>
        <div id="searchResults" class="flex-grow overflow-y-auto pb-24">
            <div class="text-center py-20 flex flex-col items-center opacity-60">
                <div class="w-20 h-20 bg-indigo-100 dark:bg-indigo-900/30 rounded-full flex items-center justify-center mb-4">
                    <i class="fas fa-search text-indigo-500 text-3xl"></i>
                </div>
                <p class="text-gray-500 dark:text-gray-400 font-medium">Busca offline instantânea</p>
                <p class="text-sm text-gray-400 mt-1">Digite uma palavra ou frase</p>
            </div>
        </div>
    </div>
    
    <div id="settingsOverlay" class="fixed inset-0 bg-gray-50 dark:bg-gray-900 z-50 hidden transition-all duration-300 p-4 pt-safe">
        <div class="flex items-center space-x-3 mb-6 bg-white dark:bg-gray-800 -mx-4 -mt-4 p-4 shadow-sm">
            <button id="closeSettings" class="w-10 h-10 rounded-full flex items-center justify-center text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700">
                <i class="fas fa-arrow-left text-lg"></i>
            </button>
            <h2 class="text-xl font-bold dark:text-white">Ajustes</h2>
        </div>
        
        <div class="space-y-6">
            <div class="bg-white rounded-2xl shadow-sm p-5 dark:bg-gray-800 border dark:border-gray-700">
                <h3 class="font-bold text-sm text-indigo-600 dark:text-indigo-400 uppercase tracking-wider mb-4">Leitura</h3>
                <div class="flex items-center justify-between">
                    <span class="text-gray-700 dark:text-gray-300 font-medium">Tamanho do Texto</span>
                    <div class="flex items-center space-x-4 bg-gray-50 dark:bg-gray-900 rounded-full p-1 border dark:border-gray-700">
                        <button id="decreaseFont" class="w-10 h-10 rounded-full flex items-center justify-center text-gray-600 dark:text-gray-300 hover:bg-white dark:hover:bg-gray-800 hover:shadow-sm"><i class="fas fa-minus"></i></button>
                        <span id="fontSizeDisplay" class="w-6 text-center font-bold dark:text-white">18</span>
                        <button id="increaseFont" class="w-10 h-10 rounded-full flex items-center justify-center text-gray-600 dark:text-gray-300 hover:bg-white dark:hover:bg-gray-800 hover:shadow-sm"><i class="fas fa-plus"></i></button>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-2xl shadow-sm p-5 dark:bg-gray-800 border dark:border-gray-700">
                <h3 class="font-bold text-sm text-red-500 uppercase tracking-wider mb-4">Dados do Aplicativo</h3>
                <button id="clearData" class="w-full bg-red-50 text-red-600 p-4 rounded-xl hover:bg-red-100 dark:bg-red-900/20 dark:text-red-400 dark:hover:bg-red-900/40 transition flex items-center justify-center font-bold">
                    <i class="fas fa-trash-alt mr-2"></i> Limpar Histórico e Registros
                </button>
            </div>
        </div>
    </div>
    
    <div id="bookmarksOverlay" class="fixed inset-0 bg-gray-50 dark:bg-gray-900 z-50 hidden transition-all duration-300 p-4 pt-safe flex flex-col">
        <div class="flex items-center space-x-3 mb-4 bg-white dark:bg-gray-800 -mx-4 -mt-4 p-4 shadow-sm shrink-0">
            <button id="closeBookmarks" class="w-10 h-10 rounded-full flex items-center justify-center text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700">
                <i class="fas fa-arrow-left text-lg"></i>
            </button>
            <h2 class="text-xl font-bold dark:text-white">Meus Registros</h2>
        </div>
        
        <div class="bg-gray-200/50 dark:bg-gray-800 p-1 rounded-xl flex mb-4 shrink-0">
            <button id="showBookmarksTab" class="flex-1 bg-white dark:bg-gray-700 shadow text-indigo-600 dark:text-indigo-400 py-2 rounded-lg text-sm font-bold transition">Marcadores</button>
            <button id="showNotesTab" class="flex-1 text-gray-500 dark:text-gray-400 py-2 rounded-lg text-sm font-bold transition">Notas</button>
            <button id="showHighlightsTab" class="flex-1 text-gray-500 dark:text-gray-400 py-2 rounded-lg text-sm font-bold transition">Cores</button>
        </div>
        
        <div id="bookmarksList" class="flex-grow overflow-y-auto pb-24"></div>
        <div id="notesList" class="flex-grow overflow-y-auto pb-24 hidden"></div>
        <div id="highlightsList" class="flex-grow overflow-y-auto pb-24 hidden"></div>
    </div>

    <div id="dailyVerseModal" class="fixed inset-0 bg-gray-900/80 backdrop-blur-sm z-[60] flex items-center justify-center hidden px-4 fade-in">
        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-sm dark:bg-gray-800 overflow-hidden slide-up border border-indigo-100 dark:border-gray-700">
            <div class="bg-gradient-to-br from-indigo-500 to-purple-600 p-8 text-center relative overflow-hidden">
                <div class="absolute top-0 left-0 w-full h-full opacity-10 bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyMCIgaGVpZ2h0PSIyMCI+PGNpcmNsZSBjeD0iMiIgY3k9IjIiIHI9IjIiIGZpbGw9IiNmZmYiLz48L3N2Zz4=')]"></div>
                <i class="fas fa-sun text-yellow-300 text-4xl mb-3 relative z-10 drop-shadow-md"></i>
                <h3 class="font-bold text-2xl text-white relative z-10">Pão Diário</h3>
            </div>
            <div class="p-8 text-center">
                <i class="fas fa-quote-left text-gray-200 dark:text-gray-700 text-4xl absolute -ml-4 -mt-2"></i>
                <p id="dailyVerseText" class="text-lg text-gray-700 dark:text-gray-200 font-bible italic mb-6 leading-relaxed relative z-10"></p>
                <div class="inline-block bg-indigo-50 dark:bg-gray-700 px-4 py-1.5 rounded-full">
                    <p id="dailyVerseRef" class="font-bold text-indigo-600 dark:text-indigo-400 text-sm"></p>
                </div>
            </div>
            <div class="p-4 bg-gray-50 dark:bg-gray-800/50">
                <button id="closeDailyVerse" class="w-full bg-gray-900 hover:bg-gray-800 dark:bg-indigo-600 dark:hover:bg-indigo-500 text-white font-bold py-4 rounded-xl transition active:scale-95">
                    Amém
                </button>
            </div>
        </div>
    </div>
    
    <div id="verseOptionsModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-end justify-center hidden fade-in">
        <div class="bg-white dark:bg-gray-800 w-full sm:w-96 rounded-t-3xl slide-up overflow-hidden pb-safe">
            <div class="p-5 border-b dark:border-gray-700 flex justify-between items-center bg-gray-50/50 dark:bg-gray-800/80">
                <div>
                    <p id="verseNumber" class="text-xs font-bold uppercase tracking-wider text-indigo-500 mb-1"></p>
                    <h3 class="font-bold text-lg text-gray-800 dark:text-white">Opções</h3>
                </div>
                <button id="closeVerseOptions" class="w-8 h-8 bg-gray-200 dark:bg-gray-700 rounded-full flex items-center justify-center text-gray-500 dark:text-gray-300">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="p-4 max-h-24 overflow-y-auto bg-white dark:bg-gray-900/30">
                <p id="verseText" class="text-sm text-gray-600 dark:text-gray-400 font-bible italic border-l-4 border-indigo-200 dark:border-indigo-800 pl-3"></p>
            </div>
            
            <div class="p-3 grid grid-cols-2 gap-2">
                <button id="underlineVerse" class="flex flex-col items-center justify-center p-4 bg-gray-50 hover:bg-indigo-50 dark:bg-gray-700 dark:hover:bg-indigo-900/30 rounded-2xl transition">
                    <i class="fas fa-underline text-indigo-500 text-xl mb-2"></i> 
                    <span class="font-semibold text-xs text-gray-700 dark:text-gray-200" id="underlineVerseText">Sublinhar</span>
                </button>
                <button id="highlightVerse" class="flex flex-col items-center justify-center p-4 bg-gray-50 hover:bg-yellow-50 dark:bg-gray-700 dark:hover:bg-yellow-900/20 rounded-2xl transition">
                    <i class="fas fa-highlighter text-yellow-500 text-xl mb-2"></i> 
                    <span class="font-semibold text-xs text-gray-700 dark:text-gray-200">Destacar cor</span>
                </button>
                <button id="bookmarkVerse" class="flex flex-col items-center justify-center p-4 bg-gray-50 hover:bg-blue-50 dark:bg-gray-700 dark:hover:bg-blue-900/20 rounded-2xl transition">
                    <i class="fas fa-bookmark text-blue-500 text-xl mb-2"></i> 
                    <span class="font-semibold text-xs text-gray-700 dark:text-gray-200" id="bookmarkVerseText">Marcador</span>
                </button>
                <button id="noteVerse" class="flex flex-col items-center justify-center p-4 bg-gray-50 hover:bg-purple-50 dark:bg-gray-700 dark:hover:bg-purple-900/20 rounded-2xl transition">
                    <i class="fas fa-sticky-note text-purple-500 text-xl mb-2"></i> 
                    <span class="font-semibold text-xs text-gray-700 dark:text-gray-200">Criar Nota</span>
                </button>
            </div>
            <div class="p-3 border-t dark:border-gray-700 flex space-x-2">
                <button id="copyVerse" class="flex-1 bg-gray-100 dark:bg-gray-700 text-gray-700 dark:text-gray-200 py-3 rounded-xl font-medium flex justify-center items-center">
                    <i class="fas fa-copy mr-2"></i> Copiar
                </button>
                <button id="shareVerse" class="flex-1 bg-green-50 text-green-600 dark:bg-green-900/20 dark:text-green-400 py-3 rounded-xl font-medium flex justify-center items-center">
                    <i class="fas fa-share-alt mr-2"></i> Enviar
                </button>
            </div>
        </div>
    </div>
    
    <div id="highlightColorModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[55] flex items-end justify-center hidden fade-in">
        <div class="bg-white dark:bg-gray-800 w-full rounded-t-3xl slide-up pb-safe">
            <div class="p-5 border-b dark:border-gray-700 flex justify-between items-center">
                <h3 class="font-bold text-lg dark:text-white">Cor do Destaque</h3>
                <button id="closeHighlightModal" class="w-8 h-8 bg-gray-200 dark:bg-gray-700 rounded-full flex items-center justify-center text-gray-500">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="p-6 grid grid-cols-4 gap-4">
                <button class="highlight-color-btn flex flex-col items-center group" data-color="yellow">
                    <div class="w-14 h-14 rounded-full bg-yellow-300 shadow-inner mb-2 ring-4 ring-transparent group-hover:ring-yellow-100 dark:group-hover:ring-yellow-900 transition"></div>
                </button>
                <button class="highlight-color-btn flex flex-col items-center group" data-color="green">
                    <div class="w-14 h-14 rounded-full bg-green-300 shadow-inner mb-2 ring-4 ring-transparent group-hover:ring-green-100 dark:group-hover:ring-green-900 transition"></div>
                </button>
                <button class="highlight-color-btn flex flex-col items-center group" data-color="blue">
                    <div class="w-14 h-14 rounded-full bg-blue-300 shadow-inner mb-2 ring-4 ring-transparent group-hover:ring-blue-100 dark:group-hover:ring-blue-900 transition"></div>
                </button>
                <button class="highlight-color-btn flex flex-col items-center group" data-color="pink">
                    <div class="w-14 h-14 rounded-full bg-pink-300 shadow-inner mb-2 ring-4 ring-transparent group-hover:ring-pink-100 dark:group-hover:ring-pink-900 transition"></div>
                </button>
            </div>
            <div class="p-4">
                <button id="removeHighlight" class="w-full py-4 text-red-500 font-bold bg-red-50 dark:bg-red-900/20 rounded-xl">
                    Remover Cor
                </button>
            </div>
        </div>
    </div>
    
    <div id="noteModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[55] flex items-center justify-center hidden fade-in px-4">
        <div class="bg-white dark:bg-gray-800 w-full max-w-md rounded-3xl shadow-2xl slide-up overflow-hidden">
            <div class="p-5 border-b dark:border-gray-700 bg-gray-50 dark:bg-gray-800/80">
                <h3 class="font-bold text-lg dark:text-white">Reflexão</h3>
                <p id="noteVerseRef" class="text-sm text-indigo-500 font-medium"></p>
            </div>
            <div class="p-5 bg-yellow-50/50 dark:bg-gray-900/50">
                <textarea id="noteTextarea" rows="5" class="w-full bg-transparent border-0 focus:ring-0 resize-none text-gray-800 dark:text-gray-200 placeholder-gray-400 dark:placeholder-gray-600 font-medium text-lg" placeholder="O que Deus falou com você aqui?"></textarea>
            </div>
            <div class="p-4 border-t dark:border-gray-700 flex justify-between items-center">
                <button id="deleteNote" class="w-10 h-10 flex items-center justify-center rounded-full text-red-400 hover:bg-red-50 dark:hover:bg-red-900/30 hidden transition">
                    <i class="fas fa-trash"></i>
                </button>
                <div class="flex space-x-3 ml-auto">
                    <button id="closeNoteModal" class="px-5 py-2 font-medium text-gray-500 hover:text-gray-700 dark:text-gray-400">Cancelar</button>
                    <button id="saveNote" class="px-6 py-2 bg-indigo-600 text-white font-bold rounded-xl shadow-md hover:bg-indigo-700 transition">Salvar</button>
                </div>
            </div>
        </div>
    </div>
    
    <div id="toast" class="fixed top-6 left-1/2 transform -translate-x-1/2 bg-gray-900 text-white px-5 py-3 rounded-full shadow-2xl hidden z-[100] fade-in flex items-center space-x-3 font-medium text-sm">
        <i class="fas fa-check-circle text-green-400 text-lg"></i>
        <span id="toastMessage"></span>
    </div>
    
    <div class="floating-nav-container">
        <div class="floating-nav glass">
            <button id="navHome" class="flex flex-col items-center justify-center w-[72px] h-14 text-indigo-600 dark:text-indigo-400">
                <i class="fas fa-book-open text-[22px] mb-1"></i>
                <span class="text-[9px] font-bold uppercase tracking-wider">Ler</span>
            </button>
            <button id="navSearch" class="flex flex-col items-center justify-center w-[72px] h-14 text-gray-400 hover:text-indigo-500 transition-colors">
                <i class="fas fa-search text-[22px] mb-1"></i>
                <span class="text-[9px] font-bold uppercase tracking-wider">Buscar</span>
            </button>
            <button id="navBookmarks" class="flex flex-col items-center justify-center w-[72px] h-14 text-gray-400 hover:text-indigo-500 transition-colors">
                <i class="fas fa-bookmark text-[22px] mb-1"></i>
                <span class="text-[9px] font-bold uppercase tracking-wider">Salvos</span>
            </button>
            <button id="navSettings" class="flex flex-col items-center justify-center w-[72px] h-14 text-gray-400 hover:text-indigo-500 transition-colors">
                <i class="fas fa-cog text-[22px] mb-1"></i>
                <span class="text-[9px] font-bold uppercase tracking-wider">Menu</span>
            </button>
        </div>
    </div>
    
    <script>
        // Array robusto de fallback caso a primeira URL falhe
        const BIBLE_URLS = [
            'https://cdn.jsdelivr.net/gh/thiagobodruk/bible@master/json/pt_acf.json',
            'https://raw.githubusercontent.com/thiagobodruk/bible/master/json/pt_acf.json'
        ];
        
        const STORAGE_KEYS = {
            bookmarks: 'bible_bookmarks', notes: 'bible_notes', highlights: 'bible_highlights',
            underlines: 'bible_underlines', theme: 'bible_theme', fontSize: 'bible_font_size',
            lastRead: 'bible_last_read', lastDailyDate: 'bible_last_daily_date', dailyHistory: 'bible_daily_history'
        };

        const DB_NAME = 'BibliaAppDB';
        function openDB() {
            return new Promise((resolve, reject) => {
                try {
                    const req = indexedDB.open(DB_NAME, 1);
                    req.onupgradeneeded = e => e.target.result.createObjectStore("store");
                    req.onsuccess = () => resolve(req.result);
                    req.onerror = () => reject(req.error);
                } catch(e) { reject(e); }
            });
        }

        async function getOfflineBible() {
            try {
                const db = await openDB();
                return new Promise(resolve => {
                    const tx = db.transaction("store", "readonly");
                    const req = tx.objectStore("store").get("bible_data");
                    req.onsuccess = () => resolve(req.result);
                    req.onerror = () => resolve(null); // Evita trava
                });
            } catch(e) { return null; }
        }

        async function saveOfflineBible(data) {
            try {
                const db = await openDB();
                return new Promise(resolve => {
                    const tx = db.transaction("store", "readwrite");
                    tx.objectStore("store").put(data, "bible_data");
                    tx.oncomplete = () => resolve();
                    tx.onerror = () => resolve(); // Evita trava se estourar limite do celular
                });
            } catch(e) { console.warn("IndexedDB block"); }
        }

        let bibleDataFull = null;
        let currentBook = "Gênesis";
        let currentChapter = 1;
        let currentVerseId = null;
        
        let bookmarks = []; let notes = []; let highlights = []; let underlines = [];

        const dailyVerseRefs = [
            {b: "João", c: 3, v: 16}, {b: "Filipenses", c: 4, v: 13}, {b: "Salmos", c: 23, v: 1},
            {b: "Romanos", c: 8, v: 28}, {b: "Isaías", c: 41, v: 10}, {b: "Josué", c: 1, v: 9},
            {b: "Jeremias", c: 29, v: 11}, {b: "Hebreus", c: 11, v: 1}, {b: "1 Pedro", c: 5, v: 7},
            {b: "Efésios", c: 2, v: 8}, {b: "João", c: 14, v: 6}, {b: "Tiago", c: 1, v: 5},
            {b: "Salmos", c: 46, v: 1}, {b: "Mateus", c: 11, v: 28}, {b: "Provérbios", c: 3, v: 5}
        ];

        async function initApp() {
            const splash = document.getElementById('splashScreen');
            const progress = document.getElementById('splashProgress');
            const status = document.getElementById('splashStatus');
            
            try {
                progress.style.width = '30%';
                
                bibleDataFull = await getOfflineBible();
                progress.style.width = '60%';
                
                if (!bibleDataFull || !Array.isArray(bibleDataFull)) {
                    status.textContent = "Baixando Bíblia para uso Offline (única vez)...";
                    let fetched = false;
                    
                    for (const url of BIBLE_URLS) {
                        try {
                            const res = await fetch(url);
                            if (res.ok) {
                                bibleDataFull = await res.json();
                                fetched = true;
                                break;
                            }
                        } catch (e) { console.warn("Falha ao buscar URL: " + url); }
                    }
                    
                    if (!fetched) throw new Error("Sem internet e sem banco local.");
                    
                    progress.style.width = '90%';
                    status.textContent = "Salvando para uso futuro...";
                    await saveOfflineBible(bibleDataFull);
                }
                
                progress.style.width = '100%';
                
                loadLocalUserData();
                populateBookSelect();
                
                const lastRead = getFromStorage(STORAGE_KEYS.lastRead);
                if (lastRead && bibleDataFull.some(b => b.name === lastRead.book)) {
                    currentBook = lastRead.book;
                    currentChapter = lastRead.chapter;
                } else {
                    currentBook = bibleDataFull[0].name;
                    currentChapter = 1;
                }
                
                updateChapterSelect(currentBook);
                document.getElementById('bookSelect').value = currentBook;
                loadChapter(currentBook, currentChapter);
                
                const savedFontSize = getFromStorage(STORAGE_KEYS.fontSize) || 18;
                document.getElementById('bibleText').style.fontSize = `${savedFontSize}px`;
                document.getElementById('fontSizeDisplay').textContent = savedFontSize;

                if (getFromStorage(STORAGE_KEYS.theme) === 'dark' || (window.matchMedia('(prefers-color-scheme: dark)').matches && !getFromStorage(STORAGE_KEYS.theme))) {
                    document.body.classList.add('dark');
                }

                setupEventListeners();
                
            } catch (error) {
                console.error("Erro na inicialização:", error);
                status.textContent = "Houve um erro. Tente limpar os dados do navegador.";
                status.classList.add("text-red-300");
            } finally {
                // Força o fechamento da tela de loading independentemente de erro
                setTimeout(() => {
                    splash.style.opacity = '0';
                    setTimeout(() => {
                        splash.classList.add('hidden');
                        if (bibleDataFull) checkDailyVerse();
                    }, 500);
                }, 800);
            }
        }

        function checkDailyVerse() {
            const today = new Date().toLocaleDateString('pt-BR');
            const lastDailyDate = getFromStorage(STORAGE_KEYS.lastDailyDate);
            
            if (lastDailyDate !== today && bibleDataFull) {
                let history = getFromStorage(STORAGE_KEYS.dailyHistory) || [];
                if (history.length >= dailyVerseRefs.length) history = [];
                
                const available = dailyVerseRefs.filter(ref => !history.includes(`${ref.b} ${ref.c}:${ref.v}`));
                const randomRef = available[Math.floor(Math.random() * available.length)];
                const refStr = `${randomRef.b} ${randomRef.c}:${randomRef.v}`;
                
                const book = bibleDataFull.find(b => b.abbrev === randomRef.b || b.name === randomRef.b);
                if (book && book.chapters[randomRef.c - 1]) {
                    const verseText = book.chapters[randomRef.c - 1][randomRef.v - 1];
                    document.getElementById('dailyVerseText').textContent = `"${verseText}"`;
                    document.getElementById('dailyVerseRef').textContent = refStr;
                    document.getElementById('dailyVerseModal').classList.remove('hidden');
                    
                    history.push(refStr);
                    saveToStorage(STORAGE_KEYS.dailyHistory, history);
                    saveToStorage(STORAGE_KEYS.lastDailyDate, today);
                }
            }
        }

        function populateBookSelect() {
            const bookSelect = document.getElementById('bookSelect');
            bookSelect.innerHTML = '';
            
            const ot = document.createElement('optgroup'); ot.label = "Antigo Testamento";
            const nt = document.createElement('optgroup'); nt.label = "Novo Testamento";

            bibleDataFull.forEach((book, i) => {
                const opt = new Option(book.name, book.name);
                (i < 39 ? ot : nt).appendChild(opt);
            });
            bookSelect.appendChild(ot); bookSelect.appendChild(nt);
        }

        function updateChapterSelect(bookName) {
            const grid = document.getElementById('chapterGrid');
            grid.innerHTML = '';
            const book = bibleDataFull.find(b => b.name === bookName);
            if (book) {
                for (let i = 1; i <= book.chapters.length; i++) {
                    const btn = document.createElement('button');
                    btn.className = `py-3 rounded-xl font-bold text-sm transition ${i === currentChapter ? 'bg-indigo-600 text-white shadow-md' : 'bg-white border border-gray-200 text-gray-700 dark:bg-gray-800 dark:border-gray-600 dark:text-gray-200 hover:bg-gray-50 dark:hover:bg-gray-700'}`;
                    btn.textContent = i;
                    btn.onclick = () => {
                        currentChapter = i;
                        loadChapter(currentBook, currentChapter);
                        document.getElementById('bookChapterSelector').classList.add('hidden');
                    };
                    grid.appendChild(btn);
                }
            }
        }

        function loadChapter(bookName, chapterNum) {
            const book = bibleDataFull.find(b => b.name === bookName);
            if (!book) return;
            const verses = book.chapters[chapterNum - 1];
            
            document.getElementById('currentBook').textContent = bookName;
            document.getElementById('currentChapter').textContent = `Capítulo ${chapterNum}`;
            document.getElementById('chapterTitle').textContent = `${bookName} ${chapterNum}`;
            
            let html = '';
            verses.forEach((verseText, i) => {
                const verseNum = i + 1;
                const verseId = `${bookName} ${chapterNum}:${verseNum}`;
                
                const isBookmarked = bookmarks.some(b => b.id === verseId);
                const hasNote = notes.some(n => n.id === verseId);
                const highlight = highlights.find(h => h.id === verseId);
                const isUnderlined = underlines.includes(verseId);
                
                const highlightClass = highlight ? `highlight-${highlight.color}` : '';
                const underlineClass = isUnderlined ? 'underlined-text' : '';
                
                html += `
                    <p class="verse ${highlightClass} rounded-lg p-1" data-verse-id="${verseId}">
                        <span class="verse-number select-none inline-flex items-center justify-center bg-indigo-50 text-indigo-600 dark:bg-indigo-900/40 dark:text-indigo-400 text-xs font-bold rounded-full min-w-[26px] h-[26px] mr-2 cursor-pointer border border-indigo-100 dark:border-indigo-800/50">${verseNum}</span>
                        <span class="text-content ${underlineClass}">${verseText}</span>
                        ${isBookmarked ? '<i class="fas fa-bookmark bookmark-icon"></i>' : ''}
                        ${hasNote ? '<span class="note-indicator"></span>' : ''}
                    </p>
                `;
            });
            
            document.getElementById('bibleText').innerHTML = html;
            saveToStorage(STORAGE_KEYS.lastRead, { book: bookName, chapter: chapterNum });
            window.scrollTo({ top: 0 });
            updateChapterSelect(bookName);
        }

        function searchBible(query) {
            const resDiv = document.getElementById('searchResults');
            if (!query || query.length < 3) {
                resDiv.innerHTML = `<div class="text-center py-20 opacity-60"><i class="fas fa-search text-3xl mb-4"></i><p>Digite ao menos 3 letras.</p></div>`;
                return;
            }
            
            resDiv.innerHTML = `<div class="flex justify-center py-20"><i class="fas fa-spinner fa-spin text-indigo-500 text-4xl"></i></div>`;
            
            setTimeout(() => {
                const normalize = str => str.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
                const normQuery = normalize(query);
                const results = [];
                
                for (const book of bibleDataFull) {
                    for (let c = 0; c < book.chapters.length; c++) {
                        for (let v = 0; v < book.chapters[c].length; v++) {
                            const text = book.chapters[c][v];
                            if (normalize(text).includes(normQuery)) {
                                results.push({ bookName: book.name, chapter: c + 1, verse: v + 1, text: text });
                            }
                        }
                    }
                }
                
                if (results.length === 0) {
                    resDiv.innerHTML = `<div class="text-center py-20 opacity-60"><i class="fas fa-folder-open text-4xl mb-4"></i><p>Nada encontrado para "<strong>${query}</strong>".</p></div>`;
                    return;
                }
                
                let html = `<div class="mb-4 text-sm font-bold text-gray-500">${results.length} resultados</div><div class="space-y-3">`;
                results.slice(0, 100).forEach(res => {
                    const regex = new RegExp(`(${query})`, 'gi');
                    const hlText = res.text.replace(regex, '<span class="bg-yellow-200 dark:bg-yellow-700/50 text-gray-900 dark:text-yellow-100 rounded px-1">$1</span>');
                    html += `
                        <div class="bg-white dark:bg-gray-800 p-5 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700 cursor-pointer active:scale-95 transition" onclick="window.goToVerse('${res.bookName.replace(/'/g, "\\'")}', ${res.chapter})">
                            <h4 class="font-bold text-indigo-600 dark:text-indigo-400 mb-2 text-sm"><i class="fas fa-book-open mr-2 opacity-50"></i>${res.bookName} ${res.chapter}:${res.verse}</h4>
                            <p class="text-gray-700 dark:text-gray-300 font-bible text-sm leading-relaxed">${hlText}</p>
                        </div>`;
                });
                if(results.length > 100) html += `<p class="text-center text-sm text-gray-400 py-4">Exibindo os primeiros 100 resultados.</p>`;
                html += '</div>';
                resDiv.innerHTML = html;
            }, 50);
        }

        window.goToVerse = function(bookName, chapter) {
            currentBook = bookName; currentChapter = chapter;
            document.getElementById('bookSelect').value = bookName;
            loadChapter(bookName, chapter);
            
            document.getElementById('searchOverlay').classList.add('hidden');
            document.getElementById('bookmarksOverlay').classList.add('hidden');
            document.getElementById('mainContent').classList.remove('hidden');
            updateNavActive('navHome');
        };

        window.goToVerseById = function(verseId) {
            const parts = verseId.split(' ');
            const verse = parts.pop().split(':');
            window.goToVerse(parts.join(' '), parseInt(verse[0]));
        };

        function setupEventListeners() {
            document.getElementById('closeDailyVerse').addEventListener('click', () => {
                document.getElementById('dailyVerseModal').classList.add('hidden');
            });

            document.getElementById('openSelectorBtn').addEventListener('click', () => {
                document.getElementById('bookSelect').value = currentBook;
                updateChapterSelect(currentBook);
                document.getElementById('bookChapterSelector').classList.remove('hidden');
            });
            document.getElementById('closeSelectorBtn').addEventListener('click', () => {
                document.getElementById('bookChapterSelector').classList.add('hidden');
            });
            
            document.getElementById('bookSelect').addEventListener('change', (e) => {
                currentBook = e.target.value;
                updateChapterSelect(currentBook);
            });
            
            document.getElementById('prevChapter').addEventListener('click', () => {
                if (currentChapter > 1) loadChapter(currentBook, currentChapter - 1);
            });
            
            document.getElementById('nextChapter').addEventListener('click', () => {
                const book = bibleDataFull.find(b => b.name === currentBook);
                if (currentChapter < book.chapters.length) loadChapter(currentBook, currentChapter + 1);
            });
            
            document.addEventListener('click', (e) => {
                if (e.target.closest('.verse-number')) {
                    const verseElement = e.target.closest('.verse');
                    const verseNum = e.target.closest('.verse-number').textContent;
                    
                    document.querySelectorAll('.verse').forEach(v => v.classList.remove('highlighted'));
                    verseElement.classList.add('highlighted');
                    
                    currentVerseId = `${currentBook} ${currentChapter}:${verseNum}`;
                    document.getElementById('verseNumber').textContent = currentVerseId;
                    
                    const textNode = verseElement.querySelector('.text-content').textContent;
                    document.getElementById('verseText').textContent = `"${textNode}"`;
                    
                    document.getElementById('underlineVerseText').textContent = underlines.includes(currentVerseId) ? "Remover Risco" : "Sublinhar";
                    document.getElementById('bookmarkVerseText').textContent = bookmarks.some(b => b.id === currentVerseId) ? "Desmarcar" : "Salvar";
                    
                    document.getElementById('verseOptionsModal').classList.remove('hidden');
                }
            });
            
            document.getElementById('closeVerseOptions').addEventListener('click', () => {
                document.getElementById('verseOptionsModal').classList.add('hidden');
                document.querySelectorAll('.verse').forEach(v => v.classList.remove('highlighted'));
            });

            document.getElementById('underlineVerse').addEventListener('click', () => {
                const idx = underlines.indexOf(currentVerseId);
                idx > -1 ? underlines.splice(idx, 1) : underlines.push(currentVerseId);
                saveToStorage(STORAGE_KEYS.underlines, underlines);
                loadChapter(currentBook, currentChapter);
                document.getElementById('verseOptionsModal').classList.add('hidden');
            });

            document.getElementById('bookmarkVerse').addEventListener('click', () => {
                const idx = bookmarks.findIndex(b => b.id === currentVerseId);
                if (idx > -1) { bookmarks.splice(idx, 1); showToast('Marcador removido'); }
                else { bookmarks.push({ id: currentVerseId, text: document.getElementById('verseText').textContent.replace(/"/g,''), date: new Date().toISOString() }); showToast('Salvo!'); }
                saveToStorage(STORAGE_KEYS.bookmarks, bookmarks);
                loadChapter(currentBook, currentChapter);
                document.getElementById('verseOptionsModal').classList.add('hidden');
            });

            document.getElementById('highlightVerse').addEventListener('click', () => {
                document.getElementById('verseOptionsModal').classList.add('hidden');
                document.getElementById('highlightColorModal').classList.remove('hidden');
            });

            document.querySelectorAll('.highlight-color-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const color = btn.dataset.color;
                    const idx = highlights.findIndex(h => h.id === currentVerseId);
                    if (idx > -1) highlights[idx].color = color;
                    else highlights.push({ id: currentVerseId, color: color, text: document.getElementById('verseText').textContent.replace(/"/g,''), date: new Date().toISOString() });
                    saveToStorage(STORAGE_KEYS.highlights, highlights);
                    loadChapter(currentBook, currentChapter);
                    document.getElementById('highlightColorModal').classList.add('hidden');
                });
            });

            document.getElementById('removeHighlight').addEventListener('click', () => {
                const idx = highlights.findIndex(h => h.id === currentVerseId);
                if (idx > -1) { highlights.splice(idx, 1); saveToStorage(STORAGE_KEYS.highlights, highlights); loadChapter(currentBook, currentChapter); }
                document.getElementById('highlightColorModal').classList.add('hidden');
            });

            document.getElementById('noteVerse').addEventListener('click', () => {
                const note = notes.find(n => n.id === currentVerseId);
                document.getElementById('noteVerseRef').textContent = currentVerseId;
                document.getElementById('noteTextarea').value = note ? note.note : '';
                document.getElementById('deleteNote').classList.toggle('hidden', !note);
                document.getElementById('verseOptionsModal').classList.add('hidden');
                document.getElementById('noteModal').classList.remove('hidden');
            });

            document.getElementById('saveNote').addEventListener('click', () => {
                const text = document.getElementById('noteTextarea').value.trim();
                if(!text) return;
                const idx = notes.findIndex(n => n.id === currentVerseId);
                if(idx > -1) { notes[idx].note = text; }
                else { notes.push({ id: currentVerseId, note: text, text: document.getElementById('verseText').textContent.replace(/"/g,''), date: new Date().toISOString() }); }
                saveToStorage(STORAGE_KEYS.notes, notes);
                loadChapter(currentBook, currentChapter);
                document.getElementById('noteModal').classList.add('hidden');
                showToast('Nota salva!');
            });

            document.getElementById('deleteNote').addEventListener('click', () => {
                const idx = notes.findIndex(n => n.id === currentVerseId);
                if(idx > -1) { notes.splice(idx, 1); saveToStorage(STORAGE_KEYS.notes, notes); loadChapter(currentBook, currentChapter); }
                document.getElementById('noteModal').classList.add('hidden');
            });
            document.getElementById('closeNoteModal').addEventListener('click', () => document.getElementById('noteModal').classList.add('hidden'));

            const doShare = () => {
                const txt = `"${document.getElementById('verseText').textContent.replace(/"/g,'')}"\n\n${currentVerseId}`;
                if (navigator.share) navigator.share({ text: txt }).catch(()=>{});
                else { navigator.clipboard.writeText(txt); showToast('Copiado!'); }
                document.getElementById('verseOptionsModal').classList.add('hidden');
            };
            document.getElementById('shareVerse').addEventListener('click', doShare);
            document.getElementById('copyVerse').addEventListener('click', doShare);

            document.getElementById('themeToggle').addEventListener('click', () => {
                document.body.classList.toggle('dark');
                saveToStorage(STORAGE_KEYS.theme, document.body.classList.contains('dark') ? 'dark' : 'light');
            });

            const toggleOverlay = (id, show, navId) => {
                ['searchOverlay', 'settingsOverlay', 'bookmarksOverlay'].forEach(o => document.getElementById(o).classList.add('hidden'));
                if (show) document.getElementById(id).classList.remove('hidden');
                document.getElementById('mainContent').classList.toggle('hidden', show);
                updateNavActive(navId);
            };

            document.getElementById('navHome').addEventListener('click', () => toggleOverlay(null, false, 'navHome'));
            
            document.getElementById('navSearch').addEventListener('click', () => toggleOverlay('searchOverlay', true, 'navSearch'));
            document.getElementById('closeSearch').addEventListener('click', () => toggleOverlay(null, false, 'navHome'));
            
            document.getElementById('searchButton').addEventListener('click', () => searchBible(document.getElementById('searchInput').value.trim()));
            document.getElementById('searchInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') searchBible(e.target.value.trim()); });

            document.getElementById('navSettings').addEventListener('click', () => toggleOverlay('settingsOverlay', true, 'navSettings'));
            document.getElementById('closeSettings').addEventListener('click', () => toggleOverlay(null, false, 'navHome'));

            document.getElementById('navBookmarks').addEventListener('click', () => { toggleOverlay('bookmarksOverlay', true, 'navBookmarks'); renderRegisters('bookmarks'); });
            document.getElementById('closeBookmarks').addEventListener('click', () => toggleOverlay(null, false, 'navHome'));

            document.getElementById('increaseFont').addEventListener('click', () => {
                let size = parseInt(document.getElementById('bibleText').style.fontSize) || 18;
                size += 2; document.getElementById('bibleText').style.fontSize = size + 'px';
                document.getElementById('fontSizeDisplay').textContent = size;
                saveToStorage(STORAGE_KEYS.fontSize, size);
            });
            document.getElementById('decreaseFont').addEventListener('click', () => {
                let size = parseInt(document.getElementById('bibleText').style.fontSize) || 18;
                if(size > 14) { size -= 2; document.getElementById('bibleText').style.fontSize = size + 'px'; document.getElementById('fontSizeDisplay').textContent = size; saveToStorage(STORAGE_KEYS.fontSize, size); }
            });
            document.getElementById('clearData').addEventListener('click', () => {
                if (confirm('Deseja apagar tudo?')) {
                    [STORAGE_KEYS.bookmarks, STORAGE_KEYS.notes, STORAGE_KEYS.highlights, STORAGE_KEYS.underlines, STORAGE_KEYS.dailyHistory].forEach(k => localStorage.removeItem(k));
                    bookmarks = []; notes = []; highlights = []; underlines = [];
                    loadChapter(currentBook, currentChapter); showToast('Tudo apagado');
                }
            });

            ['Bookmarks', 'Notes', 'Highlights'].forEach(tab => {
                document.getElementById(`show${tab}Tab`).addEventListener('click', (e) => {
                    ['Bookmarks', 'Notes', 'Highlights'].forEach(t => {
                        const btn = document.getElementById(`show${t}Tab`);
                        const list = document.getElementById(`${t.toLowerCase()}List`);
                        if(t === tab) {
                            btn.className = 'flex-1 bg-white dark:bg-gray-700 shadow text-indigo-600 dark:text-indigo-400 py-2 rounded-lg text-sm font-bold transition';
                            list.classList.remove('hidden');
                        } else {
                            btn.className = 'flex-1 text-gray-500 dark:text-gray-400 py-2 rounded-lg text-sm font-bold transition';
                            list.classList.add('hidden');
                        }
                    });
                    renderRegisters(tab.toLowerCase());
                });
            });
        }

        function renderRegisters(type) {
            const listObj = { bookmarks, notes, highlights }[type];
            const div = document.getElementById(`${type}List`);
            
            if (listObj.length === 0) {
                div.innerHTML = `<div class="text-center py-20 opacity-50"><i class="fas fa-folder-open text-4xl mb-3"></i><p>Nenhum registro aqui.</p></div>`;
                return;
            }
            
            div.innerHTML = '<div class="space-y-4">' + listObj.map((item, i) => `
                <div class="bg-white dark:bg-gray-800 p-5 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700">
                    <div class="flex justify-between items-start mb-3">
                        <h4 class="font-bold text-indigo-600 dark:text-indigo-400 cursor-pointer" onclick="window.goToVerseById('${item.id.replace(/'/g, "\\'")}')">${item.id}</h4>
                        <button onclick="window.delReg('${type}', ${i})" class="text-gray-400 hover:text-red-500"><i class="fas fa-trash"></i></button>
                    </div>
                    ${type === 'notes' ? `<div class="bg-yellow-50 dark:bg-gray-900 p-3 rounded-xl mb-2 border-l-4 border-yellow-400"><p class="text-sm font-medium dark:text-gray-200">${item.note}</p></div>` : ''}
                    <p class="text-gray-600 dark:text-gray-400 font-bible text-sm italic">"${item.text}"</p>
                </div>
            `).join('') + '</div>';
        }

        window.delReg = function(type, i) {
            if(confirm('Apagar item?')) {
                const arr = { bookmarks, notes, highlights }[type];
                arr.splice(i, 1);
                saveToStorage(STORAGE_KEYS[type], arr);
                renderRegisters(type);
                loadChapter(currentBook, currentChapter);
            }
        };

        function updateNavActive(activeId) {
            ['navHome', 'navSearch', 'navBookmarks', 'navSettings'].forEach(id => {
                const el = document.getElementById(id);
                el.classList.toggle('text-indigo-600', id === activeId); el.classList.toggle('dark:text-indigo-400', id === activeId);
                el.classList.toggle('text-gray-400', id !== activeId);
            });
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            document.getElementById('toastMessage').textContent = msg;
            t.classList.remove('hidden');
            setTimeout(() => t.classList.add('hidden'), 2500);
        }

        function saveToStorage(key, data) { try { localStorage.setItem(key, JSON.stringify(data)); } catch(e){} }
        function getFromStorage(key) { try { return JSON.parse(localStorage.getItem(key)); } catch(e){ return null; } }
        function loadLocalUserData() {
            bookmarks = getFromStorage(STORAGE_KEYS.bookmarks) || []; notes = getFromStorage(STORAGE_KEYS.notes) || [];
            highlights = getFromStorage(STORAGE_KEYS.highlights) || []; underlines = getFromStorage(STORAGE_KEYS.underlines) || [];
        }

        document.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
